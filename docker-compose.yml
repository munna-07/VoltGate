services:
  voltgate:
    image: ${VOLTGATE_IMAGE:-eceasy/voltgate:latest}
    pull_policy: always
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${VERSION:-dev}
        COMMIT: ${COMMIT:-none}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    container_name: voltgate
    # env_file:
    #   - .env
    environment:
      DEPLOY: ${DEPLOY:-}
    ports:
      - "8317:8317"
      - "8085:8085"
      - "1455:1455"
      - "54545:54545"
      - "51121:51121"
      - "11451:11451"
    volumes:
      - ${VOLTGATE_CONFIG_PATH:-./config.yaml}:/VoltGate/config.yaml
      - ${VOLTGATE_AUTH_PATH:-./auths}:/root/.voltgate
      - ${VOLTGATE_LOG_PATH:-./logs}:/VoltGate/logs
    restart: unless-stopped
